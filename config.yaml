server:
  host: "0.0.0.0"
  port: 8000

database:
  host: "localhost"
  port: 5432
  name: "ids_api"
  user: "ids_user"
  password: "ids_pass"

storage:
  upload_dir: "/var/data/ids/uploads"

upload:
  max_xml_size_mb: 2
  max_file_size_mb: 100

logging:
  level: "INFO"              # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s [%(levelname)s] %(name)s - %(message)s"
  sqlalchemy_level: "WARNING"  # DB query logging level
